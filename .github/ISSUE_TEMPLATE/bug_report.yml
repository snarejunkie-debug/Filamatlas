name: Site bug
description: Report a UI, chart, filtering, or interaction bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Tell us what looked wrong or failed.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: Chrome on Windows, Safari on iPhone, etc.
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Paste exported feedback JSON or screenshots if helpful.

